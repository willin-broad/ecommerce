name: User Service CI/CD

on:
  push:
    branches: [main]
    paths: [services/user-service/**]
  pull_request:
    paths: [services/user-service/**]

env:
  REGISTRY: ghcr.io
  IMAGE: ${{ github.repository }}/user-service

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: services/user-service/requirements.txt
      - run: cd services/user-service && pip install -r requirements.txt && pytest

  build-push:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions: {contents: read, packages: write}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ./services/user-service
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ github.sha }}

  deploy:
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy via Helm
        run: |
          helm upgrade --install ecommerce ./infra/helm/ecommerce \
            --namespace ecommerce --create-namespace \
            --set userService.image.tag=${{ github.sha }}
