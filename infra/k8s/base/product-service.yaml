apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: product-service
  template:
    metadata:
      labels:
        app: product-service
    spec:
      containers:
        - name: product-service
          image: ghcr.io/REPLACE_ME/product-service:latest
          ports: [{containerPort: 3002}]
          resources:
            requests: {cpu: "100m", memory: "128Mi"}
            limits:   {cpu: "500m", memory: "256Mi"}
          livenessProbe:
            httpGet: {path: /health, port: 3002}
            initialDelaySeconds: 15
          readinessProbe:
            httpGet: {path: /health, port: 3002}
            initialDelaySeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: product-service
spec:
  selector:
    app: product-service
  ports: [{port: 3002, targetPort: 3002}]
