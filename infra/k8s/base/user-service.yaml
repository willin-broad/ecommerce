apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
        - name: user-service
          image: ghcr.io/REPLACE_ME/user-service:latest
          ports: [{containerPort: 3001}]
          envFrom:
            - secretRef: {name: user-service-secrets}
          resources:
            requests: {cpu: "100m", memory: "128Mi"}
            limits:   {cpu: "500m", memory: "256Mi"}
          livenessProbe:
            httpGet: {path: /health, port: 3001}
            initialDelaySeconds: 15
          readinessProbe:
            httpGet: {path: /health, port: 3001}
            initialDelaySeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
spec:
  selector:
    app: user-service
  ports: [{port: 3001, targetPort: 3001}]
